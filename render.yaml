services:
  - type: web
    name: nvest-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && alembic upgrade head && python -m backend.scripts.migrate_json_to_pg
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://nvest.vercel.app
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CAPITAL_DEPART
        value: "10000"
      - key: SCAN_HOUR
        value: "9"
      - key: SCAN_MIN_CONFIDENCE
        value: "45"
      - key: SCAN_MAX_SUGGESTIONS
        value: "2"
      - key: SCAN_MAX_POSITIONS
        value: "20"
